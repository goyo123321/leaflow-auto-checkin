name: Leaflow Auto Checkin

on:
  schedule:
    - cron: '0 0 * * *'      # 每天 UTC 00:00 运行（北京时间 08:00）
    - cron: '0 0 1 * *'      # 每月1号 UTC 00:00 运行（北京时间 08:00）
  workflow_dispatch:          # 允许手动触发

jobs:
  # 原有签到任务
  checkin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run auto checkin
        env:
          LEAFLOW_ACCOUNTS: ${{ secrets.LEAFLOW_ACCOUNTS }}
          LEAFLOW_EMAIL: ${{ secrets.LEAFLOW_EMAIL }}
          LEAFLOW_PASSWORD: ${{ secrets.LEAFLOW_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_ACTIONS: true
        run: |
          python leaflow_checkin.py

  # 每月1号自动空提交（用于仓库保活）
  empty-commit:
    runs-on: ubuntu-latest
    # 仅在每月1号的定时触发时运行，手动触发不执行
    if: github.event_name == 'schedule' && github.event.schedule == '0 0 1 * *'
    permissions:
      contents: write          # 需要写入权限才能推送提交
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}   # 使用默认的 GitHub Token 进行认证

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create empty commit
        run: |
          git commit --allow-empty -m "chore: monthly empty commit [skip ci]"
          git push
